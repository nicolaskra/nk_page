name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Serve static site
        run: |
          npx --yes http-server . -p 8080 &
          sleep 3

      - name: Run Lighthouse
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080/ \
            --collect.numberOfRuns=3 \
            --collect.settings.preset=desktop \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=error \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=error
        continue-on-error: true

      - name: Comment PR with Lighthouse scores
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.lighthouseci';
            if (!fs.existsSync(path)) return;
            const files = fs.readdirSync(path).filter(f => f.startsWith('manifest'));
            if (files.length === 0) return;
            const manifest = JSON.parse(fs.readFileSync(`${path}/${files[0]}`, 'utf8'));
            const url = manifest[0]?.url || 'n/a';
            const summary = manifest[0]?.summary || {};
            const score = (k) => Math.round((summary[k] || 0) * 100);
            const body = [
              `### Lighthouse — \`${url}\``,
              ``,
              `| Categoria | Score |`,
              `|---|---|`,
              `| Performance | ${score('performance')} |`,
              `| Accessibility | ${score('accessibility')} |`,
              `| Best Practices | ${score('best-practices')} |`,
              `| SEO | ${score('seo')} |`,
              ``,
              manifest[0]?.url ? `[Report completo](${manifest[0].url})` : ''
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
